<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — The Recall Map</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #111111;
      --gray-50: #fafafa;
      --gray-200: #ebebeb;
      --gray-500: #999;
      --gray-600: #777;
      --serif: Georgia, 'Times New Roman', serif;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    body {
      font-family: var(--sans);
      background: var(--gray-50);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 16px;
      padding: 56px 48px;
      text-align: center;
      max-width: 480px;
      width: 90%;
    }
    .check {
      width: 48px; height: 48px;
      background: var(--black);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 20px; color: #fff;
    }
    h1 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: normal;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: var(--gray-600);
      line-height: 1.7;
      margin-bottom: 28px;
    }
    a {
      display: inline-block;
      font-size: 13px;
      color: var(--gray-500);
      text-decoration: none;
      border-bottom: 1px solid var(--gray-200);
      padding-bottom: 2px;
    }
    a:hover { color: var(--black); border-color: var(--black); }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>You're on the list.</h1>
    <p>We'll be in touch as soon as beta access opens.<br>In the meantime, start thinking about your 10 best stories.</p>
    <a href="/">← Back to The Recall Map</a>
  </div>
</body>
</html>
